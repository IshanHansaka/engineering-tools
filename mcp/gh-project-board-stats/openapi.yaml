openapi: 3.0.3

info:
  title: GitHub Project Board Stats API
  version: 1.0.0
  description: >
    Backend service for querying GitHub Project board statistics through the GitHub MCP integration.
    All endpoints except /health require a valid JWT (x-jwt-assertion header injected by the Choreo gateway).

servers:
  - url: /

components:
  securitySchemes:
    jwtAssertion:
      type: apiKey
      in: header
      name: x-jwt-assertion

security:
  - jwtAssertion: []

paths:
  /health:
    get:
      summary: Health check
      security: []
      responses:
        '200':
          description: OK

  /query:
    post:
      summary: Query GitHub project releases
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - question
              properties:
                question:
                  type: string
                  minLength: 1
                  pattern: '.*\S.*'
                  description: The query question to ask the AI agent about project releases.
                  example: "What are releases this week?"
      responses:
        '200':
          description: Successful response
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '504':
          description: Request timed out
        '500':
          description: Internal server error